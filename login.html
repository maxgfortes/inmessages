<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>inMessages</title>
  <link rel="stylesheet" href="src/style/root.css">
  <link rel="stylesheet" href="src/style/login.css">
    <link rel="icon" type="image/png" href="./public/img/icon.png">
    <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>*{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}input,textarea{-webkit-user-select:text;user-select:text;}</style>
</head>
<body>
  <div class="auth-container login-container">
    <div class="auth-box">
      <h1 class="auth-title">inMessages</h1>
      <p class="auth-subtitle">Sign in to your account</p>
      
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <input 
            type="email" 
            id="email" 
            placeholder="Email"
            required
            class="form-input"
          >
        </div>

        <div class="form-group">
          <input 
            type="password" 
            id="password" 
            placeholder="Password"
            required
            class="form-input"
          >
        </div>

        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>

      <div class="form-error" id="errorMessage"></div>

      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Create one</a></p>
      </div>
    </div>
  </div>

  <script type="module" src="/pwa.js"></script>
  <script type="module">
    import { authService } from './src/services/auth.js';

    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('errorMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const result = await authService.login(email, password);
      
      if (result.success) {
        window.location.href = 'direct.html';
      } else {
        errorDiv.textContent = result.error || 'Login failed. Check your credentials.';
      }
    });
  </script>
</body>
</html>
